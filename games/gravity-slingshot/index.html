<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Gravity Slingshot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#050510;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,dpr;
function resize(){dpr=Math.min(window.devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}
resize();addEventListener('resize',resize);

// ── Score reporting (JAY Games platform) ──
let totalScore=0;
function reportScore(s){totalScore=Math.max(totalScore,s);try{window.parent.postMessage({score:Math.floor(totalScore)},'*')}catch(e){}}

// ── Input ──
const keys={};
addEventListener('keydown',e=>{keys[e.code]=true;
  if(e.code==='KeyR')restart();
  if(e.code==='Space'||e.code==='Enter'){if(state==='menu')startGame();else if(state==='dead')restart();else if(state==='nextLevel')goNext()}
});
addEventListener('keyup',e=>keys[e.code]=false);

let touchActive=false,touchX=0,touchY=0,touchStartX=0,touchStartY=0;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(state==='menu'){startGame();return}
  if(state==='dead'){restart();return}
  if(state==='nextLevel'){goNext();return}
  const t=e.touches[0];touchActive=true;touchStartX=t.clientX;touchStartY=t.clientY;touchX=0;touchY=0;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!touchActive)return;
  const t=e.touches[0];touchX=(t.clientX-touchStartX)*0.04;touchY=(t.clientY-touchStartY)*0.04;
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();touchActive=false;touchX=0;touchY=0},{passive:false});

// ── State ──
let state='menu';
let level=0,deaths=0,levelTime=0,fuel=100,levelScore=0;
let player,trail,orbs,portal,walls,gravWells,particles,stars;
const MAX_FUEL=100,FUEL_USE=0.2,THRUST=0.2,FUEL_REGEN=0.04;

function makeStars(){stars=[];for(let i=0;i<150;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+0.5,b:Math.random()*0.4+0.1,ph:Math.random()*6.28})}
function boom(x,y,color,n,speed){for(let i=0;i<n;i++){const a=Math.random()*6.28,s=Math.random()*speed+0.5;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,dec:0.015+Math.random()*0.02,color,r:Math.random()*2.5+0.5})}}

// ── Handcrafted Levels (first 7) ──
const PRESET=[
  {name:'First Contact',orbs:[{x:.25,y:.5},{x:.5,y:.5},{x:.75,y:.5}],wells:[],wallData:[],start:{x:.08,y:.5},end:{x:.92,y:.5}},
  {name:'Graviton',orbs:[{x:.3,y:.3},{x:.55,y:.4},{x:.7,y:.7}],wells:[{x:.4,y:.5,m:150}],wallData:[],start:{x:.08,y:.5},end:{x:.92,y:.2}},
  {name:'Repulsor Field',orbs:[{x:.2,y:.3},{x:.4,y:.8},{x:.6,y:.2},{x:.8,y:.6}],wells:[{x:.35,y:.5,m:180},{x:.65,y:.5,m:-120}],wallData:[{x:.5,y:.35,w:15,h:80}],start:{x:.08,y:.5},end:{x:.92,y:.5}},
  {name:'The Gauntlet',orbs:[{x:.15,y:.7},{x:.35,y:.2},{x:.5,y:.5},{x:.65,y:.8},{x:.85,y:.4}],wells:[{x:.25,y:.4,m:200},{x:.5,y:.7,m:-150},{x:.75,y:.3,m:180}],wallData:[{x:.4,y:.5,w:15,h:100},{x:.6,y:.3,w:80,h:15}],start:{x:.08,y:.8},end:{x:.92,y:.15}},
  {name:'Twin Suns',orbs:[{x:.2,y:.2},{x:.8,y:.2},{x:.2,y:.8},{x:.8,y:.8},{x:.5,y:.5}],wells:[{x:.35,y:.35,m:250},{x:.65,y:.65,m:250},{x:.5,y:.5,m:-180}],wallData:[{x:.5,y:.2,w:100,h:12},{x:.5,y:.8,w:100,h:12}],start:{x:.08,y:.5},end:{x:.92,y:.5}},
  {name:'Singularity',orbs:[{x:.15,y:.5},{x:.5,y:.15},{x:.85,y:.5},{x:.5,y:.85},{x:.3,y:.5},{x:.7,y:.5}],wells:[{x:.3,y:.3,m:200},{x:.7,y:.3,m:200},{x:.3,y:.7,m:200},{x:.7,y:.7,m:200},{x:.5,y:.5,m:-250}],wallData:[{x:.4,y:.5,w:12,h:60},{x:.6,y:.5,w:12,h:60}],start:{x:.5,y:.92},end:{x:.5,y:.08}},
  {name:'Event Horizon',orbs:[{x:.12,y:.12},{x:.88,y:.12},{x:.12,y:.88},{x:.88,y:.88},{x:.5,y:.15},{x:.5,y:.85},{x:.5,y:.5}],wells:[{x:.25,y:.25,m:220},{x:.75,y:.25,m:220},{x:.25,y:.75,m:220},{x:.75,y:.75,m:220},{x:.5,y:.5,m:400},{x:.15,y:.5,m:-120},{x:.85,y:.5,m:-120}],wallData:[{x:.35,y:.5,w:12,h:80},{x:.65,y:.5,w:12,h:80},{x:.5,y:.3,w:80,h:12},{x:.5,y:.7,w:80,h:12}],start:{x:.12,y:.5},end:{x:.88,y:.5}},
];

// ── Procedural Level Generator ──
function seededRandom(seed){let s=seed;return function(){s=(s*16807+0)%2147483647;return(s-1)/2147483646}}

function generateLevel(lvl){
  const rng=seededRandom(lvl*7919+1337);
  const diff=Math.min(lvl-PRESET.length,50); // difficulty cap at +50

  // More orbs as difficulty increases (3-8)
  const orbCount=Math.min(3+Math.floor(diff*0.15),8);
  const orbs=[];
  for(let i=0;i<orbCount;i++){
    let x,y,valid;
    for(let attempt=0;attempt<20;attempt++){
      x=0.12+rng()*0.76;y=0.12+rng()*0.76;
      valid=true;
      for(const o of orbs){if(Math.hypot(o.x-x,o.y-y)<0.12){valid=false;break}}
      if(valid)break;
    }
    orbs.push({x,y});
  }

  // Gravity wells (2-7)
  const wellCount=Math.min(2+Math.floor(diff*0.12),7);
  const wells=[];
  for(let i=0;i<wellCount;i++){
    let x,y,valid;
    for(let attempt=0;attempt<20;attempt++){
      x=0.15+rng()*0.7;y=0.15+rng()*0.7;
      valid=true;
      for(const o of orbs){if(Math.hypot(o.x-x,o.y-y)<0.1){valid=false;break}}
      for(const w of wells){if(Math.hypot(w.x-x,w.y-y)<0.12){valid=false;break}}
      if(valid)break;
    }
    const mass=(100+diff*6+rng()*80)*(rng()>0.35?1:-1);
    wells.push({x,y,m:mass});
  }

  // Walls (0-4)
  const wallCount=Math.min(Math.floor(diff*0.08),4);
  const wallData=[];
  for(let i=0;i<wallCount;i++){
    const horizontal=rng()>0.5;
    const x=0.2+rng()*0.6,y=0.2+rng()*0.6;
    wallData.push({x,y,w:horizontal?60+diff*0.5:12,h:horizontal?12:60+diff*0.5});
  }

  // Start & end positions (opposite corners)
  const side=rng()>0.5;
  const start={x:side?0.08:0.92,y:rng()*0.6+0.2};
  const end={x:side?0.92:0.08,y:rng()*0.6+0.2};

  // Ensure start/end don't overlap with wells
  for(const w of wells){
    if(Math.hypot(start.x-w.x,start.y-w.y)<0.12)start.y+=0.15;
    if(Math.hypot(end.x-w.x,end.y-w.y)<0.12)end.y+=0.15;
  }

  // Level names for endless
  const endlessNames=['Void Drift','Dark Matter','Quasar Path','Nebula Run','Pulsar Gate','Gravity Maze','Singularity Deep','Event Horizon X','Cosmic Labyrinth','Stellar Storm'];
  const name=lvl<PRESET.length?PRESET[lvl].name:endlessNames[(lvl-PRESET.length)%endlessNames.length]+(lvl>=PRESET.length+10?` ${Math.floor((lvl-PRESET.length)/10)+1}`:'');

  return{name,orbs,wells,wallData,start,end};
}

function initLevel(){
  const L=level<PRESET.length?PRESET[level]:generateLevel(level);
  player={x:L.start.x*W,y:L.start.y*H,vx:0,vy:0,r:7,alive:true};
  trail=[];
  orbs=L.orbs.map(o=>({x:o.x*W,y:o.y*H,r:10,collected:false,ph:Math.random()*6.28}));
  portal={x:L.end.x*W,y:L.end.y*H,r:22,ph:0};
  walls=(L.wallData||[]).map(w=>({x:w.x*W,y:w.y*H,w:w.w,h:w.h}));
  gravWells=(L.wells||[]).map(w=>({x:w.x*W,y:w.y*H,mass:w.m,r:18,angle:0,parts:[]}));
  for(let gw of gravWells){for(let i=0;i<25;i++){const a=Math.random()*6.28,d=gw.r+Math.random()*35;gw.parts.push({a,d,sp:(Math.random()*0.02+0.008)*(gw.mass>0?1:-1)})}}
  particles=[];fuel=MAX_FUEL;levelTime=0;levelScore=0;
}

function startGame(){level=0;deaths=0;totalScore=0;state='play';makeStars();initLevel()}

function restart(){
  if(state==='dead'){level=0;deaths=0;totalScore=0;state='play';initLevel()}
}

function goNext(){
  level++;state='play';initLevel();
}

function calcLevelScore(){
  const timeBonus=Math.max(0,Math.floor(300-levelTime*10));
  const orbBonus=orbs.filter(o=>o.collected).length*100;
  const levelBonus=(level+1)*50;
  const endlessBonus=level>=PRESET.length?level*20:0;
  return timeBonus+orbBonus+levelBonus+endlessBonus;
}

// ── Update ──
function update(){
  if(state!=='play')return;
  levelTime+=1/60;
  const p=player;if(!p.alive)return;

  let tx=0,ty=0,thrusting=false;
  if(keys.ArrowUp||keys.KeyW)ty=-1;
  if(keys.ArrowDown||keys.KeyS)ty=1;
  if(keys.ArrowLeft||keys.KeyA)tx=-1;
  if(keys.ArrowRight||keys.KeyD)tx=1;
  if(touchActive){tx+=touchX;ty+=touchY}
  if(tx||ty){const len=Math.sqrt(tx*tx+ty*ty);if(len>1){tx/=len;ty/=len}thrusting=true}

  if(thrusting&&fuel>0){
    p.vx+=tx*THRUST;p.vy+=ty*THRUST;
    fuel=Math.max(0,fuel-FUEL_USE);
    if(Math.random()>0.4){const a=Math.atan2(-p.vy,-p.vx)+(Math.random()-0.5)*0.9,s=Math.random()*2+0.8;particles.push({x:p.x,y:p.y,vx:Math.cos(a)*s-p.vx*0.15,vy:Math.sin(a)*s-p.vy*0.15,life:1,dec:0.03+Math.random()*0.02,color:'#ff69b4',r:Math.random()*1.8+0.5})}
  }else{fuel=Math.min(MAX_FUEL,fuel+FUEL_REGEN)}

  for(const gw of gravWells){
    const dx=gw.x-p.x,dy=gw.y-p.y,d2=dx*dx+dy*dy,dist=Math.sqrt(d2);
    if(dist<gw.r+p.r){die();return}
    const f=gw.mass/(d2+200);
    p.vx+=dx/dist*f;p.vy+=dy/dist*f;
  }

  for(const w of walls){
    if(p.x+p.r>w.x-w.w/2&&p.x-p.r<w.x+w.w/2&&p.y+p.r>w.y-w.h/2&&p.y-p.r<w.y+w.h/2){die();return}
  }

  p.vx*=0.9985;p.vy*=0.9985;
  const sp=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
  if(sp>11){p.vx*=11/sp;p.vy*=11/sp}
  p.x+=p.vx;p.y+=p.vy;
  if(p.x<p.r){p.x=p.r;p.vx=Math.abs(p.vx)*0.4}
  if(p.x>W-p.r){p.x=W-p.r;p.vx=-Math.abs(p.vx)*0.4}
  if(p.y<p.r){p.y=p.r;p.vy=Math.abs(p.vy)*0.4}
  if(p.y>H-p.r){p.y=H-p.r;p.vy=-Math.abs(p.vy)*0.4}

  trail.push({x:p.x,y:p.y,life:1});if(trail.length>60)trail.shift();

  for(const o of orbs){
    if(o.collected)continue;
    const dx=p.x-o.x,dy=p.y-o.y;
    if(dx*dx+dy*dy<(p.r+o.r)**2){o.collected=true;boom(o.x,o.y,'#7a7aff',12,3);fuel=Math.min(MAX_FUEL,fuel+25)}
  }

  if(orbs.length>0&&orbs.every(o=>o.collected)){
    const dx=p.x-portal.x,dy=p.y-portal.y;
    if(dx*dx+dy*dy<(p.r+portal.r)**2){
      const ls=calcLevelScore();levelScore=ls;totalScore+=ls;reportScore(totalScore);
      state='nextLevel';boom(portal.x,portal.y,'#00ff88',35,4);return
    }
  }
}

function die(){player.alive=false;boom(player.x,player.y,'#ff1493',25,3.5);state='dead';deaths++;reportScore(totalScore)}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.97;p.vy*=0.97;p.life-=p.dec;if(p.life<=0)particles.splice(i,1)}
  for(const t of trail)t.life-=0.018;
  while(trail.length&&trail[0].life<=0)trail.shift();
  for(const gw of gravWells){gw.angle+=0.01;for(const p of gw.parts)p.a+=p.sp}
}

// ── Draw ──
function draw(){
  ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);
  const t=performance.now()*0.001;

  for(const s of stars){ctx.fillStyle=`rgba(255,255,255,${s.b+Math.sin(t*0.8+s.ph)*0.12})`;ctx.fillRect(s.x,s.y,s.s,s.s)}

  ctx.strokeStyle='rgba(122,122,255,0.025)';ctx.lineWidth=0.5;
  const gs=Math.max(40,W/20);
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  if(state==='menu'){
    drawOverlay('GRAVITY SLINGSHOT','Navigate the cosmos — collect orbs — survive','Press SPACE or tap to start');
    return;
  }

  // Walls
  for(const w of walls){
    ctx.save();ctx.shadowColor='#ff1493';ctx.shadowBlur=12;
    ctx.fillStyle='rgba(255,20,147,0.25)';ctx.fillRect(w.x-w.w/2,w.y-w.h/2,w.w,w.h);
    ctx.strokeStyle='rgba(255,20,147,0.7)';ctx.lineWidth=1.5;ctx.strokeRect(w.x-w.w/2,w.y-w.h/2,w.w,w.h);
    ctx.restore();
  }

  // Gravity wells
  for(const gw of gravWells){
    ctx.save();
    const neg=gw.mass<0,c=neg?[122,122,255]:[255,20,147];
    for(const p of gw.parts){
      const px=gw.x+Math.cos(p.a)*p.dist,py=gw.y+Math.sin(p.a)*p.dist;
      ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${0.15+Math.abs(p.sp)*6})`;ctx.fillRect(px-0.8,py-0.8,1.6,1.6);
    }
    const grd=ctx.createRadialGradient(gw.x,gw.y,0,gw.x,gw.y,gw.r*2.5);
    grd.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},0.35)`);
    grd.addColorStop(0.5,`rgba(${c[0]},${c[1]},${c[2]},0.08)`);
    grd.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(gw.x,gw.y,gw.r*2.5,0,6.28);ctx.fill();
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${0.5+Math.sin(t*2)*0.15})`;
    ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(gw.x,gw.y,gw.r,0,6.28);ctx.stroke();
    ctx.fillStyle=`rgb(${c[0]},${c[1]},${c[2]})`;
    ctx.font=`bold ${Math.round(gw.r*0.9)}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(neg?'⇔':'⊕',gw.x,gw.y);
    ctx.restore();
  }

  // Trail
  for(const tr of trail){const r=Math.max(0,3.5*tr.life);ctx.fillStyle=`rgba(255,105,180,${tr.life*0.45})`;ctx.beginPath();ctx.arc(tr.x,tr.y,r,0,6.28);ctx.fill()}

  // Orbs
  for(const o of orbs){
    if(o.collected)continue;
    o.ph+=0.05;const glow=0.5+Math.sin(o.ph)*0.25;
    ctx.save();ctx.shadowColor='#7a7aff';ctx.shadowBlur=18;
    ctx.fillStyle=`rgba(122,122,255,${glow})`;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,6.28);ctx.fill();
    ctx.fillStyle='rgba(180,180,255,0.9)';ctx.beginPath();ctx.arc(o.x,o.y,o.r*0.4,0,6.28);ctx.fill();
    ctx.restore();
  }

  // Portal
  portal.ph+=0.04;ctx.save();
  const allCol=orbs.length>0&&orbs.every(o=>o.collected);
  if(allCol){
    ctx.shadowColor='#00ff88';ctx.shadowBlur=25+Math.sin(portal.ph)*8;
    const grd=ctx.createRadialGradient(portal.x,portal.y,0,portal.x,portal.y,portal.r*1.8);
    grd.addColorStop(0,'rgba(0,255,136,0.7)');grd.addColorStop(0.5,'rgba(0,255,136,0.15)');grd.addColorStop(1,'rgba(0,255,136,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(portal.x,portal.y,portal.r*1.8,0,6.28);ctx.fill();
    ctx.strokeStyle='#00ff88';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(portal.x,portal.y,Math.max(1,portal.r+Math.sin(portal.ph)*2),0,6.28);ctx.stroke();
    ctx.fillStyle='rgba(0,255,136,0.8)';ctx.font='bold 14px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('▶',portal.x,portal.y);
  }else{
    ctx.globalAlpha=0.2;ctx.strokeStyle='rgba(0,255,136,0.3)';ctx.lineWidth=1;
    ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(portal.x,portal.y,portal.r,0,6.28);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(0,255,136,0.08)';ctx.beginPath();ctx.arc(portal.x,portal.y,portal.r,0,6.28);ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.restore();

  // Player
  if(player.alive){
    ctx.save();
    const grd=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,player.r*3);
    grd.addColorStop(0,'rgba(255,105,180,0.35)');grd.addColorStop(1,'rgba(255,105,180,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(player.x,player.y,player.r*3,0,6.28);ctx.fill();
    ctx.shadowColor='#ff69b4';ctx.shadowBlur=12;
    ctx.fillStyle='#ff69b4';ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,6.28);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(player.x,player.y,player.r*0.35,0,6.28);ctx.fill();
    ctx.restore();
  }

  // Particles
  for(const p of particles){const c=p.color;const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);ctx.fillStyle=`rgba(${r},${g},${b},${p.life*0.8})`;ctx.fillRect(p.x-p.r*p.life*0.5,p.y-p.r*p.life*0.5,p.r*p.life,p.r*p.life)}

  // HUD
  ctx.save();
  const L=level<PRESET.length?PRESET[level]:generateLevel(level);
  ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='bold 13px system-ui';ctx.textAlign='left';
  ctx.fillText(`Level ${level+1}: ${L.name}`,14,22);
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='12px system-ui';
  ctx.fillText(`Score: ${Math.floor(totalScore)}`,14,40);
  ctx.fillText(`Time: ${levelTime.toFixed(1)}s`,14,56);
  if(level>=PRESET.length){ctx.fillStyle='#ffd93d';ctx.font='bold 11px system-ui';ctx.fillText('∞ ENDLESS',14,72)}

  const barW=100,barH=4,barX=W-barW-14,barY=20;
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(barX,barY,barW,barH);
  ctx.fillStyle=fuel>30?'#7a7aff':'#ff1493';ctx.fillRect(barX,barY,barW*(fuel/MAX_FUEL),barH);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='10px system-ui';ctx.textAlign='right';
  ctx.fillText(`Fuel ${Math.round(fuel)}%`,W-14,barY+barH+12);
  const collected=orbs.filter(o=>o.collected).length;
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='12px system-ui';
  ctx.fillText(`Orbs: ${collected}/${orbs.length}`,W-14,48);
  ctx.restore();

  // Overlays
  if(state==='dead'){
    drawOverlay('GAME OVER',`Score: ${Math.floor(totalScore)} | Level: ${level+1} | Deaths: ${deaths}`,'Press SPACE or tap to restart');
  }
  if(state==='nextLevel'){
    const bonus=levelScore;
    drawOverlay(`LEVEL ${level+1} CLEAR`,`+${bonus} points`,'Press SPACE or tap for next level');
  }
}

function drawOverlay(title,text,sub){
  ctx.save();
  ctx.fillStyle='rgba(5,5,16,0.75)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`bold ${Math.min(48,W/12)}px system-ui`;
  const grd=ctx.createLinearGradient(W/2-100,H/2-40,W/2+100,H/2-40);
  grd.addColorStop(0,'#ff1493');grd.addColorStop(1,'#7a7aff');
  ctx.fillStyle=grd;ctx.fillText(title,W/2,H/2-30);
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font=`${Math.min(16,W/30)}px system-ui`;
  ctx.fillText(text,W/2,H/2+15);
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font=`${Math.min(13,W/38)}px system-ui`;
  ctx.fillText(sub,W/2,H/2+45);
  ctx.restore();
}

// ── Loop ──
makeStars();particles=[];trail=[];orbs=[];walls=[];gravWells=[];
portal={x:0,y:0,r:22,ph:0};player={x:0,y:0,vx:0,vy:0,r:7,alive:false};

function loop(){update();updateParticles();draw();requestAnimationFrame(loop)}
loop();
</script>
