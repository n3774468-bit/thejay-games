<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAY ELECTRIC DEFLECTOR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
        .ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(20, 0, 40, 0.85); padding: 50px; border: 2px solid #bf00ff; border-radius: 30px; box-shadow: 0 0 50px rgba(191, 0, 255, 0.5); backdrop-filter: blur(10px); width: 80%; max-width: 400px; }
        h1 { font-size: 2.5rem; margin: 0; color: #bf00ff; text-shadow: 0 0 20px #bf00ff; }
        button { padding: 20px 40px; font-size: 1.2rem; background: #bf00ff; color: #fff; border: none; cursor: pointer; border-radius: 50px; font-weight: 900; margin-top: 20px; }
    </style>
</head>
<body>

<div id="ui" class="ui">
    <h1 id="uiTitle">JAY DEFLECTOR</h1>
    <div id="hsText" style="color: #fff; margin: 15px 0;">HIGH SCORE: 0</div>
    <button id="btn">ACTIVATE CORE</button>
</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    let width, height, gameActive = false, score = 0, angle = 0, targetAngle = 0, enemies = [], particles = [], sparks = [], stars = [], highScore = localStorage.getItem('jayHS') || 0;

    function playSound(freq, type, dur) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    for(let i=0; i<150; i++) stars.push({ x: Math.random()*width, y: Math.random()*height, size: Math.random()*1.5 });

    function draw() {
        if(!gameActive) return;
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,width,height);
        stars.forEach(s => { ctx.fillStyle = "#fff"; ctx.fillRect(s.x, s.y, s.size, s.size); });
        
        ctx.fillStyle = "#aaa"; ctx.beginPath(); ctx.arc(width*0.8, height*0.2, 70, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#888"; ctx.beginPath(); ctx.arc(width*0.8-20, height*0.2-20, 15, 0, Math.PI*2); ctx.fill();

        let cx = width/2, cy = height/2;
        angle += (targetAngle - angle) * 0.15;

        
        ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
        
        
        if(Math.random() < 0.5) {
            let a = Math.random() * Math.PI * 2;
            sparks.push({ x: 120 * Math.cos(a), y: 120 * Math.sin(a), life: 0.3 });
        }

        ctx.shadowBlur = 40; ctx.shadowColor = "#bf00ff";
        ctx.fillStyle = "#bf00ff";
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            let a = i * Math.PI / 3;
            ctx.lineTo(120 * Math.cos(a), 120 * Math.sin(a));
            ctx.lineTo(150 * Math.cos(a + 0.2), 150 * Math.sin(a + 0.2));
            ctx.lineTo(120 * Math.cos(a + Math.PI/3), 120 * Math.sin(a + Math.PI/3));
        }
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 4; ctx.stroke();
        
        
        ctx.shadowBlur = 10; ctx.fillStyle = "#fff";
        sparks.forEach((s, i) => {
            ctx.fillRect(s.x, s.y, 4, 4);
            s.life -= 0.05;
            if(s.life <= 0) sparks.splice(i, 1);
        });
        
        ctx.fillStyle = "#fff"; ctx.font = "bold 40px Orbitron"; ctx.textAlign = "center";
        ctx.rotate(-angle);
        ctx.fillText("JAY", 0, 15);
        ctx.restore();

        // Meteors
        if(Math.random() < 0.04) enemies.push({ x: Math.random()*width, y: Math.random()*height, speed: 2 + score/500 });
        
        enemies.forEach((en, i) => {
            let dx = cx - en.x, dy = cy - en.y, dist = Math.hypot(dx, dy);
            en.x += (dx/dist) * en.speed; en.y += (dy/dist) * en.speed;
            particles.push({ x: en.x, y: en.y, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2, life: 0.5, color: "#ff4500" });
            ctx.fillStyle = "#ff4500"; ctx.beginPath(); ctx.arc(en.x, en.y, 15, 0, Math.PI*2); ctx.fill();
            
            if(dist < 140) { 
                let hitAngle = Math.atan2(en.y-cy, en.x-cx);
                if(Math.abs((hitAngle % (Math.PI/3)) - (angle % (Math.PI/3))) < 0.5) {
                    playSound(500, 'square', 0.2);
                    enemies.splice(i, 1); score += 10; 
                } else if(dist < 40) { gameOver(); }
            }
        });

        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.05; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); if(p.life <= 0) particles.splice(i, 1); });
        ctx.fillStyle = "white"; ctx.font = "20px Orbitron"; ctx.fillText("SCORE: "+score, 20, 40);
        requestAnimationFrame(draw);
    }

    function gameOver() {
        gameActive = false;
        if(score > highScore) { highScore = score; localStorage.setItem('jayHS', highScore); }
        playSound(100, 'sawtooth', 0.8);
        document.getElementById('uiTitle').innerText = "CORE BREACHED";
        document.getElementById('hsText').innerText = "FINAL SCORE: " + score;
        document.getElementById('btn').innerText = "RETRY";
        document.getElementById('ui').style.display = 'block';
    }

    window.addEventListener('mousemove', (e) => targetAngle = Math.atan2(e.clientY - height/2, e.clientX - width/2));
    window.addEventListener('touchmove', (e) => targetAngle = Math.atan2(e.touches[0].clientY - height/2, e.touches[0].clientX - width/2));
    document.getElementById('btn').onclick = () => { score = 0; enemies = []; gameActive = true; document.getElementById('ui').style.display = 'none'; draw(); };
</script>
</body>
</html>
