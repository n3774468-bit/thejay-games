<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steel Guardian Blitz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#111;overflow:hidden}
canvas{display:block;background:#1a1a1a}

.screen{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
background:rgba(0,0,0,.9);
text-align:center;
padding:20px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:18px;
}

h1{margin-bottom:15px}
p{max-width:700px;line-height:1.6}
.hidden{display:none}

#hud{
position:absolute;
top:10px;
left:10px;

display:flex;
gap:12px;

z-index:100;
}

.hudBox{
background:rgba(0,0,0,.6);
backdrop-filter:blur(4px);

padding:10px 14px;

border:2px solid #444;
border-radius:12px;

color:white;

min-width:140px;
}

.hudBox span{
display:block;
font-size:13px;
opacity:.8;
margin-bottom:5px;
}

#hpBar{
width:120px;
height:12px;
background:#333;
border-radius:20px;
overflow:hidden;
}

#hpFill{
width:100%;
height:100%;
background:lime;
transition:.2s;
}

.screen{
position:absolute;
inset:0;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:
linear-gradient(
rgba(0,0,0,.75),
rgba(0,0,0,.85)
);

color:white;
text-align:center;
}

.screen h1{
font-size:60px;
margin-bottom:10px;
letter-spacing:3px;
text-shadow:0 0 15px #00ff88;
}

.subtitle{
font-size:18px;
opacity:.85;
margin-bottom:25px;
max-width:500px;
}

.howToBox{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.2);
border-radius:15px;

padding:20px;
margin-bottom:25px;

width:320px;
}

.howToBox h2{
margin-bottom:15px;
color:#00ff88;
}

.howToBox p{
margin:8px 0;
}

.screen button{
padding:14px 35px;
font-size:20px;
font-weight:bold;

border:none;
border-radius:12px;

background:#00ff88;
cursor:pointer;

transition:.25s;
}

.screen button:hover{
transform:scale(1.08);
}
</style>
</head>
<body>

<div id="menu" class="screen">

    <h1>🚜Steel Guardian Blitz</h1>

    <p class="subtitle">
        Survive endless waves of enemy drones and protect your tank.
    </p>

    <div class="howToBox">

        <h2>HOW TO PLAY</h2>

        <p>🕹 Move with <b>W A S D</b></p>
        <p>🎯 Aim with the <b>Mouse</b></p>
        <p>💥 Left Click to Shoot</p>
        <p>🚁 Destroy enemy drones</p>
        <p>❤️ Avoid collisions and survive as long as possible</p>

    </div>

    <button onclick="startGame()">START GAME</button>

</div>

<div id="hud">

    <div class="hudBox">
        <span>❤️ HP</span>
        <div id="hpBar">
            <div id="hpFill"></div>
        </div>
    </div>

    <div class="hudBox">
        <span>🎯 Score</span>
        <div id="scoreText">0</div>
    </div>

    <div class="hudBox">
        <span>💥 Shots</span>
        <div id="shotsText">0</div>
    </div>

</div>


<canvas id="game"></canvas>

<div id="gameover" class="screen" style="display:none;">

    <h1>GAME OVER</h1>

    <p id="finalScore">Score: 0</p>

    <button onclick="restartGame()">
        PLAY AGAIN
    </button>

</div>



<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let player,zombies,bullets,score,hp,gameRunning;
let shots=0;
let keys={};

let mouseX=0;
let mouseY=0;
let walkAnim = 0;


document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
canvas.addEventListener("mousemove",(e)=>{
    mouseX=e.clientX;
    mouseY=e.clientY;
});

window.addEventListener("resize",()=>{
canvas.width=innerWidth;
canvas.height=innerHeight;
});

canvas.addEventListener("click",e=>{
if(!gameRunning)return;

const dx=e.clientX-player.x;
const dy=e.clientY-player.y;
const angle=Math.atan2(dy,dx);

shots++;
bullets.push({
x:player.x + Math.cos(angle)*30,
y:player.y + Math.sin(angle)*30,
vx:Math.cos(angle)*8,
vy:Math.sin(angle)*8,
r:5
});
});

function initGame(){
player={x:canvas.width/2,y:canvas.height/2,size:20,speed:4};
zombies=[];
bullets=[];
score=0;
hp=100;
shots=0;
gameRunning=true;
}

function spawnZombie(){
zombies.push({
x:Math.random()<0.5?0:canvas.width,
y:Math.random()*canvas.height,
size:18,
speed:1+Math.random()*1.5
});
}

setInterval(()=>{
if(gameRunning)spawnZombie();
},1000);

function update(){

walkAnim += 0.2;

if(keys["w"])player.y-=player.speed;
if(keys["s"])player.y+=player.speed;
if(keys["a"])player.x-=player.speed;
if(keys["d"])player.x+=player.speed;

player.x=Math.max(player.size,Math.min(canvas.width-player.size,player.x));
player.y=Math.max(player.size,Math.min(canvas.height-player.size,player.y));

for(let i=bullets.length-1;i>=0;i--){
let b=bullets[i];
b.x+=b.vx;
b.y+=b.vy;

if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){
bullets.splice(i,1);
}
}

for(let zi=zombies.length-1;zi>=0;zi--){
let z=zombies[zi];

const dx=player.x-z.x;
const dy=player.y-z.y;
const dist=Math.hypot(dx,dy);

z.x+=dx/dist*z.speed;
z.y+=dy/dist*z.speed;

if(dist<z.size+player.size){

    hp -= 10;

    zombies.splice(zi,1);

    continue;
}

for(let bi=bullets.length-1;bi>=0;bi--){
let b=bullets[bi];

const hit=Math.hypot(b.x-z.x,b.y-z.y);

if(hit<z.size+b.r){
zombies.splice(zi,1);
bullets.splice(bi,1);
score += 5;
break;
}
}
}

if(hp<=0){
gameOver();
}

document.getElementById("hpFill").style.width=hp+"%";

document.getElementById("scoreText").innerText=score;

document.getElementById("shotsText").innerText=shots;
}

function draw(){
    

ctx.clearRect(0,0,canvas.width,canvas.height);
// tanah
ctx.fillStyle="#6b4f2a";
ctx.fillRect(0,0,canvas.width,canvas.height);

// bercak tanah
for(let i=0;i<80;i++){

    ctx.fillStyle="rgba(0,0,0,0.1)";

    ctx.beginPath();
    ctx.arc(
        (i*137)%canvas.width,
        (i*91)%canvas.height,
        15,
        0,
        Math.PI*2
    );
    ctx.fill();
}

const angle=Math.atan2(
    mouseY-player.y,
    mouseX-player.x
);

ctx.save();

ctx.translate(player.x,player.y);
ctx.rotate(angle);

// rantai
ctx.fillStyle="#333";
ctx.fillRect(-22,-17,44,6);
ctx.fillRect(-22,11,44,6);

// badan
ctx.fillStyle="#2f855a";
ctx.fillRect(-20,-15,40,30);

// turret
ctx.fillStyle="#4ade80";
ctx.beginPath();
ctx.arc(0,0,12,0,Math.PI*2);
ctx.fill();

// laras
ctx.fillStyle="#666";
ctx.fillRect(0,-3,28,6);

ctx.restore();
// peluru
ctx.fillStyle="yellow";

for(const b of bullets){
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
}
for(const z of zombies){

    // baling kiri
    ctx.strokeStyle="#888";
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(z.x-18,z.y);
    ctx.lineTo(z.x-8,z.y);
    ctx.stroke();

    // baling kanan
    ctx.beginPath();
    ctx.moveTo(z.x+8,z.y);
    ctx.lineTo(z.x+18,z.y);
    ctx.stroke();

    // baling atas
    ctx.beginPath();
    ctx.moveTo(z.x,z.y-18);
    ctx.lineTo(z.x,z.y-8);
    ctx.stroke();

    // baling bawah
    ctx.beginPath();
    ctx.moveTo(z.x,z.y+8);
    ctx.lineTo(z.x,z.y+18);
    ctx.stroke();

    // badan drone
    ctx.fillStyle="#555";
    ctx.fillRect(z.x-8,z.y-8,16,16);

    // mata merah
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(z.x,z.y,3,0,Math.PI*2);
    ctx.fill();
}

}

function loop(){
if(gameRunning){
update();
draw();
}
requestAnimationFrame(loop);
}
loop();

function startGame(){
    document.getElementById("menu").style.display="none";
    document.getElementById("gameover").style.display="none";
    initGame();
}

// Menambahkan fungsi restart agar tombol 'Play Again' bekerja
function restartGame(){
    document.getElementById("gameover").style.display="none";
    initGame();
}

function showHowTo(){
document.getElementById("menu").classList.add("hidden");
document.getElementById("howto").classList.remove("hidden");
}

function backMenu(){
document.getElementById("howto").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

function gameOver(){

    gameRunning=false;

    document.getElementById("finalScore").innerText =
        "Score: " + score;

    document.getElementById("gameover").style.display="flex";
}
</script>
</body>
</html>
